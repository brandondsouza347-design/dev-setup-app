name: Build & Release

# Triggers:
#   - Push a tag like "v1.0.0"  → builds + creates a GitHub Release with DMG/MSI attached
#   - Manual trigger via GitHub UI → builds without publishing a release
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      release:
        description: "Create a GitHub Release?"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # macOS — builds a universal .dmg (Intel + Apple Silicon)
  # ────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS (Universal)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dev-setup-app/package-lock.json

      - name: Setup Rust (stable, universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: "aarch64-apple-darwin,x86_64-apple-darwin"

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "dev-setup-app/src-tauri -> target"

      - name: Install frontend dependencies
        working-directory: dev-setup-app
        run: npm ci

      - name: Build Tauri app (Universal macOS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code-signing (optional — set in repo secrets to sign the app)
          # APPLE_CERTIFICATE:            ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD:   ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY:       ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID:                     ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD:               ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID:                ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: dev-setup-app
          tagName: ${{ github.ref_name }}
          releaseName: "Dev Setup ${{ github.ref_name }}"
          releaseBody: |
            ## Dev Environment Setup ${{ github.ref_name }}

            ### macOS
            Download **Dev.Setup_${{ github.ref_name }}_universal.dmg**

            ### Windows
            Download **Dev.Setup_${{ github.ref_name }}_x64-setup.exe** or the `.msi` installer.

            ---
            See [README](https://github.com/${{ github.repository }}/blob/main/dev-setup-app/README.md) for installation instructions.
          releaseDraft: false
          prerelease: false
          args: "--target universal-apple-darwin"

      - name: Upload DMG as workflow artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dev-setup-app/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

  # ────────────────────────────────────────────────────────────────────────────
  # Windows — builds an NSIS (.exe) and MSI installer
  # ────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dev-setup-app/package-lock.json

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "dev-setup-app/src-tauri -> target"

      - name: Install frontend dependencies
        working-directory: dev-setup-app
        run: npm ci

      - name: Build Tauri app (Windows x64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code-signing (optional — set in repo secrets to sign the installer)
          # TAURI_PRIVATE_KEY:   ${{ secrets.TAURI_PRIVATE_KEY }}
          # TAURI_KEY_PASSWORD:  ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: dev-setup-app
          tagName: ${{ github.ref_name }}
          releaseName: "Dev Setup ${{ github.ref_name }}"
          releaseBody: |
            ## Dev Environment Setup ${{ github.ref_name }}

            ### Windows
            Download **Dev.Setup_${{ github.ref_name }}_x64-setup.exe** or the `.msi` installer.

            ### macOS
            Download **Dev.Setup_${{ github.ref_name }}_universal.dmg**
          releaseDraft: false
          prerelease: false

      - name: Upload installers as workflow artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            dev-setup-app/src-tauri/target/release/bundle/msi/*.msi
            dev-setup-app/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
