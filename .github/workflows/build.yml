name: Build & Release

on:
  push:
    branches:
      - master
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      platforms:
        description: "Which platforms to build"
        required: true
        default: "all"
        type: choice
        options: [all, macos-only, windows-only]
      publish:
        description: "Publish as a GitHub Release?"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

env:
  APP_DIR: dev-setup-app

jobs:
  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    name: 🍎 macOS (Universal DMG)
    runs-on: macos-latest
    if: |
      github.event_name == 'push' ||
      inputs.platforms == 'all' ||
      inputs.platforms == 'macos-only'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.APP_DIR }}/src-tauri -> target

      - name: Generate icons (macOS)
        working-directory: ${{ env.APP_DIR }}
        run: |
          pip3 install Pillow --quiet --break-system-packages 2>/dev/null || pip3 install Pillow --quiet
          python3 - <<'PYEOF'
          import os, struct, zlib
          from PIL import Image, ImageDraw

          os.makedirs("src-tauri/icons", exist_ok=True)

          def make_icon(size):
              img = Image.new("RGBA", (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              m = size // 8
              draw.rounded_rectangle([m, m, size-m, size-m], radius=size//5, fill=(37,99,235))
              r = size // 4
              cx, cy = size//2, size//2
              draw.ellipse([cx-r, cy-r, cx+r, cy+r], fill=(255,255,255))
              return img

          for sz in [32, 128, 256, 512]:
              make_icon(sz).save(f"src-tauri/icons/{sz}x{sz}.png")
          make_icon(256).save("src-tauri/icons/128x128@2x.png")

          # .ico for Windows bundler
          imgs = [make_icon(s) for s in [16,32,48,64,128,256]]
          imgs[0].save("src-tauri/icons/icon.ico", format="ICO",
                       sizes=[(s,s) for s in [16,32,48,64,128,256]],
                       append_images=imgs[1:])
          print("PNG + ICO icons generated")
          PYEOF

      - name: Create .icns (macOS native tool)
        working-directory: ${{ env.APP_DIR }}
        run: |
          mkdir -p /tmp/AppIcon.iconset
          for size in 16 32 64 128 256 512; do
            python3 -c "
          from PIL import Image, ImageDraw
          size=$size
          img = Image.new('RGBA',(size,size),(0,0,0,0))
          d=ImageDraw.Draw(img)
          m=size//8
          d.rounded_rectangle([m,m,size-m,size-m],radius=size//5,fill=(37,99,235))
          r=size//4; cx,cy=size//2,size//2
          d.ellipse([cx-r,cy-r,cx+r,cy+r],fill=(255,255,255))
          img.save('/tmp/AppIcon.iconset/icon_${size}x${size}.png')
          img.save('/tmp/AppIcon.iconset/icon_${size}x${size}@2x.png')
          "
          done
          iconutil -c icns /tmp/AppIcon.iconset -o src-tauri/icons/icon.icns
          echo "✓ .icns created"

      - name: Install frontend deps
        working-directory: ${{ env.APP_DIR }}
        run: npm install

      - name: Build (universal macOS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ${{ env.APP_DIR }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Dev Setup {0}', github.ref_name) || '' }}
          releaseDraft: ${{ startsWith(github.ref, 'refs/tags/') == false }}
          prerelease: false
          includeUpdaterJson: false
          args: --target universal-apple-darwin

      - name: List macOS bundle output
        if: always()
        run: find ${{ env.APP_DIR }}/src-tauri/target -name "*.dmg" -o -name "*.app" 2>/dev/null | head -20 || echo "No bundles found"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: macos-dmg
          path: ${{ env.APP_DIR }}/src-tauri/target/**/bundle/dmg/*.dmg
          if-no-files-found: warn
          retention-days: 14

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: 🪟 Windows (MSI + NSIS)
    runs-on: windows-latest
    if: |
      github.event_name == 'push' ||
      inputs.platforms == 'all' ||
      inputs.platforms == 'windows-only'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.APP_DIR }}/src-tauri -> target

      - name: Install Pillow (Windows)
        run: pip install Pillow

      - name: Generate icons (Windows)
        working-directory: ${{ env.APP_DIR }}
        shell: python
        run: |
          import os
          from PIL import Image, ImageDraw

          os.makedirs("src-tauri/icons", exist_ok=True)

          def make_icon(size):
              img = Image.new("RGBA", (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              m = size // 8
              draw.rounded_rectangle([m, m, size-m, size-m], radius=size//5, fill=(37,99,235))
              r = size // 4; cx, cy = size//2, size//2
              draw.ellipse([cx-r, cy-r, cx+r, cy+r], fill=(255,255,255))
              return img

          for sz in [32, 128, 256, 512]:
              make_icon(sz).save(f"src-tauri/icons/{sz}x{sz}.png")
          make_icon(256).save("src-tauri/icons/128x128@2x.png")
          # Placeholder icns (not used on Windows but Tauri config lists it)
          make_icon(512).save("src-tauri/icons/icon.icns")
          imgs = [make_icon(s) for s in [16,32,48,64,128,256]]
          imgs[0].save("src-tauri/icons/icon.ico", format="ICO",
                       sizes=[(s,s) for s in [16,32,48,64,128,256]],
                       append_images=imgs[1:])
          print("Icons generated")

      - name: Install frontend deps
        working-directory: ${{ env.APP_DIR }}
        run: npm install

      - name: Build (Windows x64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ${{ env.APP_DIR }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Dev Setup {0}', github.ref_name) || '' }}
          releaseDraft: ${{ startsWith(github.ref, 'refs/tags/') == false }}
          prerelease: false
          includeUpdaterJson: false

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-installers
          path: |
            ${{ env.APP_DIR }}/src-tauri/target/release/bundle/msi/*.msi
            ${{ env.APP_DIR }}/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 14

  # ── Summary ────────────────────────────────────────────────────────────────
  summary:
    name: 📋 Build Summary
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          echo "## Build Results" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🍎 macOS   | ${{ needs.build-macos.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🪟 Windows | ${{ needs.build-windows.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download from **Actions → this run → Artifacts**" >> $GITHUB_STEP_SUMMARY
